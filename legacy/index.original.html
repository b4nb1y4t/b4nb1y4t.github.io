<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товарний — Графік</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #4f8cff;
    --accent2: #a259ff;
    --green: #29d988;
    --orange: #ff8c42;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --text: #e8ecf5;
    --muted: #6b7590;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .divider { width: 1px; height: 28px; background: var(--border); }
  header nav { display: flex; gap: 4px; }
  .nav-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #fff; }

  header .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7aee; transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--green); color: #0d1f14; }
  .btn-success:hover { background: #20c072; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ===== LAYOUT ===== */
  .app { display: flex; height: calc(100vh - 65px); }
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

  /* ===== SIDEBAR ===== */
  .sidebar-section { padding: 0 16px 16px; }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 8px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
    user-select: none;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(79,140,255,0.12); color: var(--accent); }
  .sidebar-item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-18plus { background: var(--red); }
  .dot-normal { background: var(--green); }

  /* ===== PAGE SECTIONS ===== */
  .page { display: none; }
  .page.active { display: block; }

  .page-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  /* ===== MONTH TABS ===== */
  .month-tabs { display: flex; gap: 6px; margin-bottom: 24px; }
  .month-tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .month-tab:hover { border-color: var(--accent); color: var(--accent); }
  .month-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ===== WEEK SELECTOR ===== */
  .week-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .week-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Onest', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }
  .week-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .week-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* ===== SCHEDULE TABLE ===== */
  .schedule-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .schedule-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .schedule-header h3 { font-size: 13px; font-weight: 600; color: var(--muted); }
  .section-badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-blue { background: rgba(79,140,255,0.15); color: var(--accent); }
  .badge-purple { background: rgba(162,89,255,0.15); color: var(--accent2); }
  .badge-green { background: rgba(41,217,136,0.15); color: var(--green); }

  .table-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }
  th {
    background: var(--surface2);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th.day-col { min-width: 44px; text-align: center; }
  th.name-col { min-width: 160px; text-align: left; padding-left: 20px; }
  th.rate-col { min-width: 60px; text-align: center; }
  th.total-col { min-width: 70px; text-align: center; background: rgba(79,140,255,0.06); }

  td {
    padding: 0;
    border-bottom: 1px solid rgba(42,48,69,0.6);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.015); }

  .name-cell {
    padding: 12px 8px 12px 20px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .age-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .age-minor { background: rgba(255,77,109,0.2); color: var(--red); }
  .age-adult { background: rgba(41,217,136,0.1); color: var(--green); }

  .rate-cell {
    text-align: center;
    padding: 12px 8px;
    font-size: 12px;
    color: var(--yellow);
    font-weight: 600;
  }
  .hours-cell {
    text-align: center;
    padding: 4px 3px;
  }
  .hours-input {
    width: 40px;
    text-align: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 2px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .hours-input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(79,140,255,0.08);
  }
  .hours-input:hover { border-color: var(--border); }
  .hours-input.has-value { color: var(--text); }
  .hours-input.empty { color: var(--muted); }
  .hours-input.vacation { color: var(--orange) !important; font-style: italic; }

  .day-header-col { text-align: center; }
  .day-num { font-size: 11px; font-weight: 700; }
  .day-name-h { font-size: 9px; color: var(--muted); }
  .weekend-col { background: rgba(255,140,66,0.04); }
  .weekend-col .hours-input { color: var(--orange); }

  .total-cell {
    text-align: center;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(79,140,255,0.04);
  }
  .vacation-total {
    font-size: 11px;
    color: var(--orange);
    display: block;
  }

  /* ===== EMPLOYEES PAGE ===== */
  .employees-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .employee-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .employee-card:hover { border-color: var(--accent); }
  .emp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .emp-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0;
  }
  .emp-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .emp-info .emp-section { font-size: 11px; color: var(--muted); }
  .emp-stats { display: flex; gap: 12px; }
  .emp-stat { flex: 1; }
  .emp-stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .emp-stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .emp-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .modal h3 { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .toggle-group { display: flex; align-items: center; gap: 12px; }
  .toggle {
    width: 44px; height: 24px; border-radius: 12px;
    background: var(--border); cursor: pointer;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--green); }
  .toggle::after {
    content: ''; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; position: absolute; top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  /* ===== EXPORT PAGE ===== */
  .export-preview {
    background: #fff;
    color: #111;
    border-radius: var(--radius);
    padding: 24px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    overflow-x: auto;
  }
  .export-preview table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .export-preview th {
    background: #1e2330;
    color: #fff;
    padding: 6px 8px;
    font-size: 10px;
    border: 1px solid #ccc;
    text-transform: none;
    letter-spacing: 0;
  }
  .export-preview td { padding: 5px 8px; border: 1px solid #ddd; text-align: center; }
  .export-preview .name-td { text-align: left; font-weight: 500; }
  .export-preview .total-td { font-weight: 700; background: #f0f4ff; color: #2255cc; }
  .export-preview .empty-td { color: #ccc; }
  .export-preview .weekend-td { background: #fff8f0; }
  #exportCanvas { display: none; }
  .export-actions { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

  /* ===== LEGEND ===== */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    min-width: 120px;
  }
  .stat-card .val { font-size: 24px; font-weight: 800; font-family: 'Unbounded', sans-serif; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .val-blue { color: var(--accent); }
  .val-green { color: var(--green); }
  .val-orange { color: var(--orange); }
  .val-purple { color: var(--accent2); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* ===== SEARCH BAR ===== */
  .search-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 13px;
    max-width: 320px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 13px;
  }
  select.filter-select:focus { outline: none; border-color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>ТОВАРНИЙ ГРАФІК</h1>
  <div class="divider"></div>
  <nav>
    <button class="nav-btn active" onclick="showPage('schedule')">📅 Графік</button>
    <button class="nav-btn" onclick="showPage('employees')">👥 Персонал</button>
    <button class="nav-btn" onclick="showPage('export')">📷 Фото таблиці</button>
  </nav>
  <div class="header-right">
    <button class="btn btn-ghost btn-sm" onclick="openAddEmployee()">+ Співробітник</button>
    <button class="btn btn-primary btn-sm" onclick="saveAll()">💾 Зберегти</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Розділи</div>
      <div class="sidebar-item active" onclick="filterSection('all', this)">
        <div class="dot" style="background:var(--accent)"></div>
        Всі відділи
      </div>
      <div class="sidebar-item" onclick="filterSection('сборка', this)">
        <div class="dot" style="background:var(--green)"></div>
        Сборка
      </div>
      <div class="sidebar-item" onclick="filterSection('стеллажка', this)">
        <div class="dot" style="background:var(--accent2)"></div>
        Стеллажка
      </div>
      <div class="sidebar-item" onclick="filterSection('молочка', this)">
        <div class="dot" style="background:var(--orange)"></div>
        Овочі–Молочка
      </div>
      <div class="sidebar-item" onclick="filterSection('склад', this)">
        <div class="dot" style="background:var(--yellow)"></div>
        Склад
      </div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border);padding-top:16px">
      <div class="sidebar-label">Фільтри</div>
      <div class="sidebar-item" onclick="filterAge('all', this)">
        <div class="dot" style="background:var(--muted)"></div>
        Всі вікові
      </div>
      <div class="sidebar-item" onclick="filterAge('adult', this)">
        <div class="dot dot-normal"></div>
        Тільки 18+
      </div>
      <div class="sidebar-item" onclick="filterAge('minor', this)">
        <div class="dot dot-18plus"></div>
        До 18 років
      </div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border);padding-top:16px">
      <div class="sidebar-label">Місяці</div>
      <div id="monthNav"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- SCHEDULE PAGE -->
    <div class="page active" id="page-schedule">
      <div class="page-title" id="scheduleTitle">Графік</div>

      <div class="stats-bar" id="statsBar"></div>

      <div class="month-tabs" id="monthTabs"></div>

      <div class="week-selector" id="weekSelector"></div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Вихідний</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Робочий</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,77,109,0.3)"></div>До 18 р.</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>18+</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Відпустка (В)</div>
      </div>

      <div id="scheduleTables"></div>
    </div>

    <!-- EMPLOYEES PAGE -->
    <div class="page" id="page-employees">
      <div class="page-title">Персонал</div>
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Пошук за іменем..." id="empSearch" oninput="renderEmployees()">
        <select class="filter-select" id="empSectionFilter" onchange="renderEmployees()">
          <option value="all">Всі відділи</option>
          <option value="сборка">Сборка</option>
          <option value="стеллажка">Стеллажка</option>
          <option value="молочка">Овочі–Молочка</option>
          <option value="склад">Склад</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openAddEmployee()">+ Додати</button>
      </div>
      <div class="employees-grid" id="employeesGrid"></div>
    </div>

    <!-- EXPORT PAGE -->
    <div class="page" id="page-export">
      <div class="page-title">Фото таблиці</div>
      <div class="export-actions">
        <div class="month-tabs" id="exportMonthTabs" style="margin:0"></div>
      </div>
      <div class="export-actions">
        <button class="btn btn-success" onclick="downloadTableImage()">📷 Зберегти як зображення</button>
        <button class="btn btn-ghost" onclick="printTable()">🖨️ Друк</button>
      </div>
      <div id="exportPreview"></div>
    </div>

  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="empModal">
  <div class="modal">
    <h3 id="empModalTitle">Додати співробітника</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Прізвище</label>
        <input type="text" id="empLastName" placeholder="Іванов">
      </div>
      <div class="form-group">
        <label>Ім'я</label>
        <input type="text" id="empFirstName" placeholder="Іван">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">

// ============================================================
//  WEEK SELECTOR
// ============================================================
function getWeeks(month) {
  const m = MONTHS.find(m=>m.id===month);
  const weeks = [];
  let day = 1;
  while (day <= m.days) {
    const start = day;
    // find end of week (next sunday or end of month)
    let end = day;
    while (end <= m.days && getDayName(month, end) !== 'нд') end++;
    if (end > m.days) end = m.days;
    else {
      // sunday ends the week
    }
    weeks.push({ start, end, label: `${start}–${end}` });
    day = end + 1;
  }
  return weeks;
}

function renderWeekSelector(month) {
  const weeks = getWeeks(month);
  const el = document.getElementById('weekSelector');
  el.innerHTML = `<button class="week-btn ${currentWeek===0?'active':''}" onclick="selectWeek(0,this)">Весь місяць</button>` +
    weeks.map((w,i)=>
      `<button class="week-btn ${currentWeek===i+1?'active':''}" onclick="selectWeek(${i+1},this)">Тиж. ${i+1} (${w.label})</button>`
    ).join('');
}

function selectWeek(n, el) {
  currentWeek = n;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderSchedule();
}

function getDaysToShow(month) {
  const m = MONTHS.find(mx=>mx.id===month);
  if (currentWeek === 0) return Array.from({length:m.days},(_,i)=>i+1);
  const weeks = getWeeks(month);
  const w = weeks[currentWeek-1];
  const days = [];
  for (let d=w.start; d<=w.end; d++) days.push(d);
  return days;
}

// ============================================================
//  SCHEDULE RENDER
// ============================================================
const SECTION_ORDER = ['сборка','молочка','стеллажка','склад'];
const SECTION_LABELS = { сборка:'Сборка', молочка:'Овочі–Молочка', стеллажка:'Стеллажка', склад:'Склад' };
const SECTION_BADGE = { сборка:'badge-green', молочка:'badge-purple', стеллажка:'badge-blue', склад:'badge-green' };

function renderSchedule() {
  document.getElementById('scheduleTitle').textContent = `Графік — ${currentMonth}`;
  renderWeekSelector(currentMonth);
  const days = getDaysToShow(currentMonth);

  const filtered = getFilteredEmps();
  const sections = currentSection === 'all'
    ? SECTION_ORDER.filter(s => filtered.some(e=>e.section===s))
    : [currentSection];

  let html = '';
  for (const sec of sections) {
    const emps = filtered.filter(e=>e.section===sec && (e.hours[currentMonth] || e.vacation));
    if (!emps.length) continue;
    html += renderSectionTable(sec, emps, days);
  }
  if (!html) html = `<div class="empty-state"><div class="icon">📭</div>Немає співробітників для відображення</div>`;
  document.getElementById('scheduleTables').innerHTML = html;
}

function renderSectionTable(sec, emps, days) {
  const dayHeaders = days.map(d=>{
    const dn = getDayName(currentMonth, d);
    const wknd = dn==='нд'||dn==='сб';
    return `<th class="day-col ${wknd?'weekend-col':''}">
      <div class="day-num">${d}</div>
      <div class="day-name-h">${dn}</div>
    </th>`;
  }).join('');

  const rows = emps.map(e => renderEmployeeRow(e, days)).join('');

  return `
  <div class="schedule-wrapper" style="margin-bottom:20px">
    <div class="schedule-header">
      <h3>${SECTION_LABELS[sec] || sec}</h3>
      <span class="section-badge ${SECTION_BADGE[sec]||'badge-blue'}">${emps.length} осіб</span>
    </div>
    <div class="table-scroll">
    <table>
      <thead><tr>
        <th class="name-col">Ім'я</th>
        <th class="rate-col">Ставка</th>
        ${dayHeaders}
        <th class="total-col">План</th>
        <th class="total-col">Відп.</th>
        <th class="total-col">Всього</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

function renderEmployeeRow(e, days) {
  const monthHours = e.hours[currentMonth] || {};
  const vac = (e.vacation && e.vacation[currentMonth]) || 0;

  const cells = days.map(d => {
    const dn = getDayName(currentMonth, d);
    const wknd = dn==='нд'||dn==='сб';
    const val = monthHours[String(d)];
    const isEmpty = val === undefined || val === null || val === '';
    const isVac = val === 'В' || val === 'в';
    const cls = ['hours-input', isEmpty?'empty':'has-value', isVac?'vacation':'', wknd?'':''].join(' ');
    const displayVal = isEmpty ? '' : String(val);
    return `<td class="hours-cell ${wknd?'weekend-col':''}">
      <input type="text" class="${cls}" value="${displayVal}" 
        onchange="updateHours(${e.id},'${currentMonth}',${d},this.value)"
        title="День ${d}, ${dn}">
    </td>`;
  }).join('');

  // Calculate plan total (excluding vacation zeros that are still 0)
  const planTotal = Object.values(monthHours).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const grandTotal = planTotal + (parseFloat(vac)||0);

  const ageBadge = e.adult
    ? `<span class="age-badge age-adult">18+</span>`
    : `<span class="age-badge age-minor">-18</span>`;

  return `<tr>
    <td><div class="name-cell">
      ${ageBadge}
      <span>${e.name}</span>
      <span style="margin-left:auto;color:var(--muted);font-size:11px;cursor:pointer" 
        onclick="openEditEmployee(${e.id})" title="Редагувати">✏️</span>
    </div></td>
    <td class="rate-cell">${e.rate}</td>
    ${cells}
    <td class="total-cell">${planTotal}</td>
    <td class="total-cell" style="color:var(--orange)">${vac||0}</td>
    <td class="total-cell">${grandTotal}</td>
  </tr>`;
}

function updateHours(empId, month, day, val) {
  const emp = employees.find(e=>e.id===empId);
  if (!emp) return;
  if (!emp.hours[month]) emp.hours[month] = {};
  const num = parseFloat(val);
  if (val === '' || val === null) {
    delete emp.hours[month][String(day)];
  } else if (val === 'В' || val === 'в') {
    emp.hours[month][String(day)] = 'В';
  } else if (!isNaN(num)) {
    emp.hours[month][String(day)] = num;
  } else {
    emp.hours[month][String(day)] = val;
  }
  updateStats();
  showToast('Збережено', 'success');
}

  const emps = employees.filter(e => currentSection==='all' || e.section===currentSection);

    const mh = e.hours[currentMonth]||{};
    return s + Object.values(mh).reduce((ss,v)=>ss+(parseFloat(v)||0),0);
  },0);
  const totalVac = emps.reduce((s,e)=>s+((e.vacation&&e.vacation[currentMonth])||0),0);
  const adults = emps.filter(e=>e.adult).length;
  const minors = emps.filter(e=>!e.adult).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="val val-blue">${emps.length}</div><div class="lbl">Співробітників</div></div>
    <div class="stat-card"><div class="val val-green">${totalHours}</div><div class="lbl">Год. (план)</div></div>
    <div class="stat-card"><div class="val val-orange">${totalVac}</div><div class="lbl">Год. відпустка</div></div>
    <div class="stat-card"><div class="val val-green">${adults}</div><div class="lbl">18+ / <span style="color:var(--red)">${minors}</span> до 18</div></div>
  `;
}

// ============================================================
//  EMPLOYEES PAGE
// ============================================================
const SECTION_COLORS = { сборка:'#29d988', молочка:'#a259ff', стеллажка:'#4f8cff', склад:'#ffd166' };

function renderEmployees() {
  const search = document.getElementById('empSearch').value.toLowerCase();
  const secFilter = document.getElementById('empSectionFilter').value;
  let emps = employees.filter(e=>{
    if (search && !e.name.toLowerCase().includes(search)) return false;
    if (secFilter !== 'all' && !e.section.includes(secFilter)) return false;
    return true;
  });

  const grid = document.getElementById('employeesGrid');
  if (!emps.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div>Нічого не знайдено</div>`;
    return;
  }

  grid.innerHTML = emps.map(e => {
    const color = SECTION_COLORS[e.section] || '#4f8cff';
    const initials = e.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const totalHours = MONTHS.reduce((s,m)=>{
      const mh = e.hours[m.id]||{};
      return s + Object.values(mh).reduce((ss,v)=>ss+(parseFloat(v)||0),0);
    },0);
    const totalVac = MONTHS.reduce((s,m)=>s+((e.vacation&&e.vacation[m.id])||0),0);
    return `
    <div class="employee-card">
      <div class="emp-header">
        <div class="emp-avatar" style="background:${color}22;color:${color}">${initials}</div>
        <div class="emp-info">
          <h4>${e.name}</h4>
          <div class="emp-section">${SECTION_LABELS[e.section]||e.section} · ставка ${e.rate} · ${e.adult?'18+':'до 18'}</div>
        </div>
      </div>
      <div class="emp-stats">
        <div class="emp-stat"><div class="emp-stat-val" style="color:${color}">${totalHours}</div><div class="emp-stat-label">Год. всього</div></div>
        <div class="emp-stat"><div class="emp-stat-val" style="color:var(--orange)">${totalVac}</div><div class="emp-stat-label">Год. відпустка</div></div>
        <div class="emp-stat"><div class="emp-stat-val" style="color:var(--yellow)">${e.rate}</div><div class="emp-stat-label">Ставка</div></div>
      </div>
      <div class="emp-actions">
        <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openEditEmployee(${e.id})">✏️ Редагувати</button>
        <button class="btn btn-sm" style="background:rgba(255,77,109,0.15);color:var(--red)" onclick="deleteEmployee(${e.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
//  EMPLOYEE MODAL
// ============================================================
function openAddEmployee() {
  editingEmpId = null;
  document.getElementById('empModalTitle').textContent = 'Додати співробітника';
  document.getElementById('empLastName').value = '';
  document.getElementById('empFirstName').value = '';
  document.getElementById('empRate').value = '1';
  document.getElementById('empSection').value = 'сборка';
  empAgeAdult = true;
  updateAgeToggle();
  document.getElementById('empModal').classList.add('open');
}

function openEditEmployee(id) {
  const emp = employees.find(e=>e.id===id);
  if (!emp) return;
  editingEmpId = id;
  const parts = emp.name.split(' ');
  document.getElementById('empModalTitle').textContent = 'Редагувати співробітника';
  document.getElementById('empLastName').value = parts[0]||'';
  document.getElementById('empFirstName').value = parts.slice(1).join(' ')||'';
  document.getElementById('empRate').value = String(emp.rate);
  document.getElementById('empSection').value = emp.section;
  empAgeAdult = emp.adult;
  updateAgeToggle();
  document.getElementById('empModal').classList.add('open');
}

function toggleAge() {
  empAgeAdult = !empAgeAdult;
  updateAgeToggle();
}
function updateAgeToggle() {
  const t = document.getElementById('empAgeToggle');
  const l = document.getElementById('empAgeLabel');
  t.className = 'toggle' + (empAgeAdult?' on':'');
  l.textContent = empAgeAdult ? 'Так — 18+' : 'Ні — до 18 років';
}

function saveEmployee() {
  const last = document.getElementById('empLastName').value.trim();
  const first = document.getElementById('empFirstName').value.trim();
  if (!last) { showToast('Вкажіть прізвище', 'error'); return; }
  const name = last + (first?' '+first:'');
  const rate = parseFloat(document.getElementById('empRate').value);
  const section = document.getElementById('empSection').value;

  if (editingEmpId) {
    const emp = employees.find(e=>e.id===editingEmpId);
    if (emp) { emp.name=name; emp.rate=rate; emp.section=section; emp.adult=empAgeAdult; }
    showToast('Збережено', 'success');
  } else {
    const h = {}; const v = {};
    MONTHS.forEach(m=>{ h[m.id]={}; v[m.id]=0; });
    employees.push({ id:nextId++, name, section, rate, adult:empAgeAdult, hours:h, vacation:v });
    showToast('Додано', 'success');
  }
  closeModal('empModal');
  renderEmployees();
  renderSchedule();
  updateStats();
}

function deleteEmployee(id) {
  if (!confirm('Видалити співробітника?')) return;
  employees = employees.filter(e=>e.id!==id);
  renderEmployees();
  renderSchedule();
  updateStats();
  showToast('Видалено', 'error');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ============================================================
//  EXPORT / PHOTO
// ============================================================
function renderExport() {
  const m = MONTHS.find(mx=>mx.id===currentMonth);
  if (!m) return;
  const days = Array.from({length:m.days},(_,i)=>i+1);

  const sections = SECTION_ORDER.filter(s=>employees.some(e=>e.section===s));
  let html = '';

  for (const sec of sections) {
    const emps = employees.filter(e=>e.section===sec);
    if (!emps.length) continue;

    const dayHeaders = days.map(d=>{
      const dn = getDayName(currentMonth,d);
      const wknd = dn==='нд'||dn==='сб';
      return `<th style="${wknd?'background:#fff4eb':'background:#1e2330'}">${d}<br><small>${dn}</small></th>`;
    }).join('');

    const rows = emps.map(e=>{
      const mh = e.hours[currentMonth]||{};
      const vac = (e.vacation&&e.vacation[currentMonth])||0;
      const cells = days.map(d=>{
        const v = mh[String(d)];
        const dn = getDayName(currentMonth,d);
        const wknd = dn==='нд'||dn==='сб';
        const style = wknd?'background:#fff4eb;':'';
        if (v===undefined||v===null||v==='') return `<td class="empty-td" style="${style}">—</td>`;
        return `<td style="${style}color:${wknd?'#cc7700':'#222'}">${v}</td>`;
      }).join('');
      const plan = Object.values(mh).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const age = e.adult ? '✅' : '🔴';
      return `<tr>
        <td class="name-td">${age} ${e.name}</td>
        <td>${e.rate}</td>
        ${cells}
        <td class="total-td">${plan}</td>
        <td style="color:#cc7700;font-weight:600">${vac||0}</td>
        <td class="total-td">${plan+(parseFloat(vac)||0)}</td>
      </tr>`;
    }).join('');

    html += `
    <div style="margin-bottom:24px">
      <h3 style="font-size:13px;font-weight:700;margin-bottom:8px;color:#333;text-transform:uppercase;letter-spacing:1px">${SECTION_LABELS[sec]||sec}</h3>
      <table>
        <thead><tr>
          <th style="text-align:left">Ім'я</th>
          <th>Ставка</th>
          ${dayHeaders}
          <th style="background:#2255cc;color:#fff">План</th>
          <th style="background:#cc7700;color:#fff">Відп.</th>
          <th style="background:#2255cc;color:#fff">Всього</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  document.getElementById('exportPreview').innerHTML = `
    <div class="export-preview" id="exportTable">
      <h2 style="font-family:Arial;font-size:16px;font-weight:700;margin-bottom:4px;color:#111">ТОВАРНИЙ — ГРАФІК</h2>
      <p style="font-size:11px;color:#666;margin-bottom:16px">${currentMonth} 2026</p>
      ${html}
    </div>`;
}

function downloadTableImage() {
  const el = document.getElementById('exportTable');
  showToast('Генерую зображення...', 'success');
  html2canvas(el, { backgroundColor: '#ffffff', scale: 2, useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Графік_${currentMonth}_2026.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Зображення збережено!', 'success');
  }).catch(()=>showToast('Помилка генерації','error'));
}

function printTable() {
  const html = document.getElementById('exportTable').outerHTML;
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Графік ${currentMonth}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:10px;color:#111}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ccc;padding:3px 6px;text-align:center}
    th{background:#1e2330;color:#fff}
    .name-td{text-align:left}
    .total-td{background:#f0f4ff;color:#2255cc;font-weight:700}
    @media print{body{margin:0}}
  </style></head><body>${html}</body></html>`);
  w.document.close();
  w.print();
}

// ============================================================
//  SAVE (localStorage)
// ============================================================
function saveAll() {
  try {
    localStorage.setItem('schedule_employees', JSON.stringify(employees));
    showToast('Всі дані збережено!', 'success');
  } catch(e) {
    showToast('Помилка збереження', 'error');
  }
}

// Load from localStorage
try {
  const saved = localStorage.getItem('schedule_employees');
  if (saved) { employees = JSON.parse(saved); nextId = Math.max(...employees.map(e=>e.id))+1; }
} catch(e) {}

// ============================================================
//  TOAST
// ============================================================
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.className='toast', 2500);
}

</script>
</body>
</html>
